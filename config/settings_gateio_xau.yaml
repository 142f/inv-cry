exchange:
  exchange_id: gateio
  default_type: swap
  api_key_env: GATEIO_API_KEY
  api_secret_env: GATEIO_API_SECRET
  api_passphrase_env: GATEIO_API_PASSPHRASE
  enable_rate_limit: true
  recv_window_ms: 5000
  timeout_ms: 10000

strategy:
  symbols: [BTCUSDT, ETHUSDT, XAUUSDT]
  raw_timeframes: [15m, 30m, 1h, 2h, 4h, 1d]
  aggregate_timeframes: [2d, 5d, 7d]
  weights:
    7d: 24
    5d: 20
    2d: 16
    1d: 14
    4h: 10
    2h: 7
    1h: 5
    30m: 3
    15m: 1
  r_gate_long: 0.5
  r_gate_short: -0.65
  breakout_filter: 0.0006
  atr_period: 14
  stop_atr_mult: 1.0
  min_stop_atr_mult: 0.2
  time_stop_bars_15m: 24
  time_stop_min_r: -0.2
  min_mid_tf_confirm: 2
  short_min_mid_tf_confirm: 2
  require_daily_align_for_short: false

risk:
  risk_tier_a: 0.005
  risk_tier_b: 0.0035
  risk_tier_c: 0.002
  leverage_tier_a: 4.0
  leverage_tier_b: 3.0
  leverage_tier_c: 2.0
  max_leverage_hard: 5.0
  portfolio_risk_target: 0.015
  portfolio_risk_hard: 0.02
  daily_drawdown_limit: 0.02
  same_direction_corr_haircut: 0.30
  add_on_ratio: 0.25
  reduce_step_ratio: 0.25
  max_add_ons: 1

cost:
  fee_taker: 0.0005
  fee_maker: 0.0002
  slippage_bps: 5
  spread_threshold_bps: 8
  slippage_buffer_bps: 5
  funding_settlement_hours: 8
  funding_missing_policy: zero_and_warn
  funding_extreme_threshold: 0.0015

data:
  fetch_limit: 2000
  timezone: UTC
  require_closed_only: true
  min_required_bars_15m: 300
  min_required_bars_1d: 220
  max_gap_multiple: 2

runtime:
  mode: backtest
  log_level: INFO
  log_dir: logs
  state_dir: state
  run_once: true
